<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물놀이 여행 후보지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #f5f5f4;
    --surface: #ffffff;
    --surface2: #f9f9f8;
    --border: #e4e4e2;
    --border-strong: #d1d1ce;
    --text: #1c1c1a;
    --text-sec: #6b6b68;
    --text-muted: #9b9b98;
    --accent: #178add;
    --accent-bg: #e6f1fb;
    --accent-border: #b5d4f4;
    --accent-text: #0c447c;
    --success-bg: #eaf3de;
    --success-border: #c0dd97;
    --success-text: #3b6d11;
    --warn-bg: #faeeda;
    --warn-border: #fac775;
    --warn-text: #854f0b;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .main-wrap { max-width: 1080px; margin: 0 auto; padding: 2.5rem 1.5rem; }
  .page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .page-header h1 { font-size: 24px; font-weight: 700; }
  .hub-link-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(23,138,221,0.25); background: rgba(23,138,221,0.08); color: var(--accent); font-size: 13px; cursor: pointer; text-decoration: none; transition: background 0.15s, transform 0.15s; }
  .hub-link-btn:hover { background: rgba(23,138,221,0.16); transform: translateY(-1px); }
  .page-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }

  .trip-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s; }
  .trip-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(23,138,221,0.1); transform: translateY(-2px); }
  .card-accent-bar { height: 4px; border-radius: 4px 4px 0 0; position: absolute; top: 0; left: 0; right: 0; }
  .card-icon-box { width: 48px; height: 48px; border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px; font-weight: 700; }
  .card-name { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  .card-meta { display: flex; flex-direction: column; gap: 5px; }
  .meta-row { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-sec); }
  .meta-row i { font-size: 14px; color: var(--text-muted); }
  .card-arrow { position: absolute; bottom: 1.1rem; right: 1.1rem; color: var(--text-muted); font-size: 15px; }

  .add-card { background: var(--surface2); border: 1.5px dashed var(--border-strong); border-radius: 12px; padding: 1.25rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 155px; transition: background 0.15s, border-color 0.15s; }
  .add-card:hover { background: var(--surface); border-color: var(--accent); }
  .add-card span { font-size: 13px; color: var(--text-muted); }

  .detail-wrap { max-width: 1080px; margin: 0 auto; padding: 2.5rem 1.5rem; display: none; touch-action: pan-y; }
  .top-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  .back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #0f537c; cursor: pointer; background: #eaf6ff; border: 1px solid #bcdff5; padding: 8px 14px; border-radius: 12px; transition: background 0.12s, transform 0.12s; font-weight: 600; }
  .back-btn:hover { background: #d8ecff; transform: translateY(-1px); }
  .edit-btn { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 13px; color: #7a5a08; background: #fff4d6; border: 1px solid #f5df9f; padding: 8px 14px; border-radius: 12px; cursor: pointer; transition: background 0.12s, transform 0.12s; font-weight: 600; }
  .edit-btn:hover { background: #fff1bc; transform: translateY(-1px); }
  .delete-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #a12d3f; background: #fff1f3; border: 1px solid #f2d6db; padding: 8px 14px; border-radius: 12px; cursor: pointer; transition: background 0.12s, transform 0.12s; font-weight: 600; }
  .delete-btn:hover { background: #ffe4e9; transform: translateY(-1px); }
  .detail-footer { display: flex; justify-content: flex-end; margin-top: 16px; }

  .detail-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.75rem; margin-bottom: 12px; display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .hero-icon { width: 58px; height: 58px; border-radius: 12px; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; }
  .hero-details { flex: 1; min-width: 220px; }
  .hero-name { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .hero-subtitle { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
  .detail-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .power-link, .map-link { display: inline-flex; align-items: center; justify-content: center; padding: 0; border-radius: 12px; text-decoration: none; width: 40px; height: 40px; transition: transform 0.15s, background 0.15s; }
  .power-link { background: #e7f8ed; color: #2f7f47; border: 1px solid #bfe6c6; }
  .power-link:hover { transform: translateY(-1px); background: #d9f0db; }
  .map-link { background: #e7f1ff; color: #2c65d8; border: 1px solid #c9daf4; }
  .map-link:hover { transform: translateY(-1px); background: #d7e7ff; }
  .power-link i { font-size: 16px; }
  .map-link img { width: 18px; height: 18px; display: block; }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 12px; }
  .sec-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .facility-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
  .fac-item { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 6px; background: var(--bg); border-radius: var(--radius); font-size: 12px; color: var(--text-sec); text-align: center; }
  .fac-item i { font-size: 18px; color: var(--accent); }
  .notes-text { font-size: 14px; line-height: 1.7; color: var(--text); }
  .score-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .score-row:last-child { border-bottom: none; padding-bottom: 0; }
  .score-label { color: var(--text-sec); display: flex; align-items: center; gap: 7px; }
  .score-meta { display: flex; align-items: center; gap: 10px; }
  .score-val { font-size: 15px; color: var(--text); }
  .detail-stars { display: flex; gap: 4px; }
  .detail-stars span { font-size: 16px; color: #FFB800; }
  .detail-stars span.inactive { color: #d8d8d8; }
  .rating-picker { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .rating-star { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 10px; cursor: pointer; transition: background 0.15s, transform 0.15s; font-size: 16px; color: #e0e0e0; background: #f5f7fb; border: 1px solid #dde3ec; }
  .rating-star.filled { color: #FFB800; background: rgba(255,184,0,0.12); border-color: rgba(255,184,0,0.25); }
  .rating-star:hover { transform: translateY(-1px); }

  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .photo-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .photo-thumb:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
  .photo-preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(72px, 1fr)); gap: 8px; margin-top: 10px; }
  .photo-preview { position: relative; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview-remove { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; border: none; border-radius: 50%; background: rgba(0,0,0,0.55); color: #fff; cursor: pointer; }
  .photo-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .photo-viewer-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 250; align-items: center; justify-content: center; padding: 1rem; }
  .photo-viewer-bg.open { display: flex; }
  .photo-viewer { position: relative; width: min(920px, 100%); max-height: 92vh; background: var(--surface); border-radius: 16px; overflow: hidden; }
  .viewer-track { display: flex; width: 300%; transform: translateX(-33.333%); transition: transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94); will-change: transform; }
  .photo-viewer.dragging .viewer-track { transition: none; }
  .viewer-image { flex: 0 0 33.333%; width: 33.333%; max-height: 92vh; object-fit: contain; touch-action: pan-y; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-start; justify-content: center; padding: 1rem 0; overflow-y: auto; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: min(460px, 100%); max-height: calc(100vh - 2rem); overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
  .field input, .field textarea { width: 100%; font-size: 16px; padding: 8px 10px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface2); color: var(--text); font-family: inherit; }
  .field input:focus, .field textarea:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .field textarea { min-height: 72px; resize: vertical; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
  .chip { padding: 5px 11px; font-size: 12px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface2); color: var(--text-sec); cursor: pointer; transition: all 0.1s; user-select: none; display: flex; align-items: center; gap: 4px; }
  .chip.on { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-cancel { padding: 7px 16px; font-size: 13px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface2); color: var(--text-sec); cursor: pointer; }
  .btn-save { padding: 7px 16px; font-size: 13px; border-radius: var(--radius); border: 1px solid var(--accent-border); background: var(--accent-bg); color: var(--accent-text); cursor: pointer; font-weight: 500; }
  .btn-save:hover { background: var(--accent-border); }

  @media (max-width: 840px) {
    .main-wrap, .detail-wrap { padding: 1.75rem 1rem; }
    .cards-grid { gap: 14px; }
    .top-bar { justify-content: space-between; }
    .detail-hero { padding: 1.4rem; }
  }
  @media (max-width: 620px) {
    .detail-hero { flex-direction: row; align-items: center; }
    .hero-icon { width: 48px; height: 48px; }
    .hero-name { font-size: 18px; }
    .hero-subtitle { font-size: 13px; margin-bottom: 0; }
    .detail-links { margin-left: auto; }
    .map-link, .power-link { width: 32px; height: 32px; border-radius: 10px; }
    .power-link i, .map-link img { width: 14px; height: 14px; font-size: 14px; }
    .top-bar { justify-content: center; }
  }
  @media(max-width:520px){ .cards-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<!-- MAIN PAGE -->
<div class="main-wrap" id="main-page">
  <div class="page-header">
    <i class="ti ti-waves" style="font-size:22px;color:#178add"></i>
    <h1>물놀이 여행 후보지</h1>
  </div>
  <div class="page-sub">카드를 클릭하면 상세 정보를 볼 수 있어요</div>
  <div class="cards-grid" id="cards-container"></div>
</div>

<!-- DETAIL PAGE -->
<div class="detail-wrap" id="detail-page">
  <div class="top-bar">
    <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i> 목록으로</button>
    <button class="edit-btn" id="edit-btn"><i class="ti ti-edit"></i> 편집</button>
  </div>
  <div id="detail-content"></div>
  <div class="detail-footer">
    <button class="delete-btn" id="delete-btn"><i class="ti ti-trash"></i> 삭제</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">후보지 정보 입력</h3>
    <div class="field"><label>장소명</label><input id="f-name" placeholder="예: 이토시마 해수욕장"></div>
    <div class="field"><label>日本語</label><input id="f-subtitle"></div>
    <div class="field"><label>소요시간</label><input id="f-time" placeholder="예: 차로 1시간 30분"></div>
    <div class="field"><label>가격</label><input id="f-price" placeholder="예: 입장료 500엔 / 무료"></div>
    <div class="field"><label>홈페이지</label><input id="f-website" placeholder="https://example.com"></div>
    <div class="field"><label>구글맵 URL</label><input id="f-mapurl" placeholder="https://www.google.com/maps/..."></div>
    <div class="field">
      <label>편의시설</label>
      <div class="chip-group" id="fac-chips"></div>
    </div>
    <div class="field">
      <label>사진 업로드</label>
      <input id="f-photos" type="file" accept="image/*" multiple>
      <div class="photo-preview-grid" id="photo-preview-grid"></div>
      <p class="photo-hint">최대 5장까지 추가할 수 있습니다.</p>
    </div>
    <div class="field"><label>메모</label><textarea id="f-notes" placeholder="주차장 협소, 오전 방문 추천 등"></textarea></div>
    <div class="field"><label>추천도</label>
      <div class="rating-picker" id="f-score-stars"></div>
      <input type="hidden" id="f-score" value="3">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel-btn">닫기</button>
      <button class="btn-save" id="modal-save-btn">저장</button>
    </div>
  </div>
</div>

<div class="photo-viewer-bg" id="photo-viewer-bg">
  <div class="photo-viewer">
    <div class="viewer-track" id="viewer-track">
      <img class="viewer-image" id="viewer-image-prev" src="" alt="">
      <img class="viewer-image" id="viewer-image-curr" src="" alt="사진 보기">
      <img class="viewer-image" id="viewer-image-next" src="" alt="">
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDF83ac7VKySDfR4XoW30obfZizL2uImr8",
  authDomain: "benri-tools-c518b.firebaseapp.com",
  databaseURL: "https://benri-tools-c518b-default-rtdb.firebaseio.com",
  projectId: "benri-tools-c518b",
  storageBucket: "benri-tools-c518b.firebasestorage.app",
  messagingSenderId: "193300241858",
  appId: "1:193300241858:web:cc8acfcab5ddbeb6c28a5b",
  measurementId: "G-Q1KR2VNMYR"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const cardsRef = ref(db, 'watertrip/cards');

// ── 상수 ──────────────────────────────────────────────
const CARD_STYLES = [
  {icon:'ti-ripple', iconBg:'#e8f4fd', iconColor:'#1a7abf'},
  {icon:'ti-tree',   iconBg:'#e8faf3', iconColor:'#0f9e6e'},
  {icon:'ti-mountain',iconBg:'#f0eeff',iconColor:'#6c4fd6'},
  {icon:'ti-plant',  iconBg:'#eaf3de', iconColor:'#3b7a2e'},
];
const FACILITIES = [
  {id:'parking',     icon:'ti-car',              label:'무료주차'},
  {id:'restroom',    icon:'ti-building',          label:'화장실'},
  {id:'shower',      icon:'ti-bath',              label:'샤워실'},
  {id:'rental',      icon:'ti-shopping-bag',      label:'용품렌탈'},
  {id:'restaurant',  icon:'ti-tools-kitchen-2',   label:'식당'},
  {id:'convenience', icon:'ti-shopping-cart',     label:'편의점'},
  {id:'waterplay',   icon:'ti-droplet',           label:'물놀이'},
  {id:'onsen',       icon:'ti-ripple',            label:'온천'},
  {id:'cook',        icon:'ti-flame',             label:'취사가능'},
];
const COLORS = ['#378ADD','#1D9E75','#D85A30','#D4537E'];
const DEFAULT_CARDS = [
  {id:0, name:'이토시마 해수욕장', icon:'ti-ripple', iconBg:'#e8f4fd', iconColor:'#1a7abf', time:'차로 40분', price:'무료 (주차 700엔~)', facilities:['parking','restroom','shower','restaurant','waterplay'], notes:'후쿠오카 근교 인기 해변. 7~8월 성수기 혼잡. 오전 일찍 도착 추천. 모래사장 넓고 수심 얕아 어린이 가능.', score:5, images:[]},
  {id:1, name:'마이즈루 공원 분수', icon:'ti-tree', iconBg:'#e8faf3', iconColor:'#0f9e6e', time:'지하철 20분', price:'무료', facilities:['restroom','waterplay','convenience'], notes:'시내에서 가깝고 어린이 물놀이 공간 있음. 여름 한정 운영. 주차는 유료 공원 주차장 이용.', score:4, images:[]},
  {id:2, name:'노코노시마 섬', icon:'ti-mountain', iconBg:'#f0eeff', iconColor:'#6c4fd6', time:'페리 10분 포함 1시간', price:'페리 왕복 800엔 + 입장료 500엔', facilities:['parking','restroom','restaurant','rental','waterplay'], notes:'배 타고 가는 특별한 경험. 꽃밭과 바다 모두 즐길 수 있음. 스노클링 가능. 주말 페리 혼잡.', score:4, images:[]},
];

// ── 상태 ──────────────────────────────────────────────
let cards = [];
let current = null;
let editIdx = null;
let selFac = [];
let selImages = [];
let currentPhotoIndex = 0;
let initialized = false;
const photoViewer = document.querySelector('.photo-viewer');
const viewerTrack = document.getElementById('viewer-track');
const viewerImgPrev = document.getElementById('viewer-image-prev');
const viewerImgCurr = document.getElementById('viewer-image-curr');
const viewerImgNext = document.getElementById('viewer-image-next');
let photoSwipe = { startX: 0, deltaX: 0, startY: 0, active: false };

function loadAdjacentImages() {
  const card = cards[current];
  if (!card || !card.images || !card.images.length) return;
  const total = card.images.length;
  viewerImgPrev.src = card.images[(currentPhotoIndex - 1 + total) % total];
  viewerImgCurr.src = card.images[currentPhotoIndex];
  viewerImgNext.src = card.images[(currentPhotoIndex + 1) % total];
}

function setTrackPos(deltaX, animated) {
  viewerTrack.style.transition = animated ? 'transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94)' : 'none';
  viewerTrack.style.transform = `translateX(calc(-33.333% + ${deltaX}px))`;
}

function setupPhotoViewerSwipe() {
  if (!photoViewer || !viewerTrack) return;

  photoViewer.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    photoSwipe.startX = e.touches[0].clientX;
    photoSwipe.startY = e.touches[0].clientY;
    photoSwipe.deltaX = 0;
    photoSwipe.active = true;
    photoViewer.classList.add('dragging');
  });

  photoViewer.addEventListener('touchmove', e => {
    if (!photoSwipe.active || e.touches.length !== 1) return;
    const touch = e.touches[0];
    const dx = touch.clientX - photoSwipe.startX;
    const dy = touch.clientY - photoSwipe.startY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) return;
    photoSwipe.deltaX = dx;
    e.preventDefault();
    setTrackPos(dx, false);
  }, { passive: false });

  photoViewer.addEventListener('touchend', () => {
    if (!photoSwipe.active) return;
    photoViewer.classList.remove('dragging');
    const card = cards[current];
    const total = card?.images?.length ?? 0;
    const threshold = 60;

    if (Math.abs(photoSwipe.deltaX) > threshold && total > 1) {
      const direction = photoSwipe.deltaX < 0 ? 1 : -1;
      const targetPct = direction === 1 ? -66.666 : 0;
      viewerTrack.style.transition = 'transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      viewerTrack.style.transform = `translateX(${targetPct}%)`;
      viewerTrack.addEventListener('transitionend', function handler() {
        viewerTrack.removeEventListener('transitionend', handler);
        currentPhotoIndex = (currentPhotoIndex + direction + total) % total;
        viewerTrack.style.transition = 'none';
        viewerTrack.style.transform = 'translateX(-33.333%)';
        loadAdjacentImages();
      });
    } else {
      setTrackPos(0, true);
    }
    photoSwipe.active = false;
  });
}

setupPhotoViewerSwipe();

// ── Firebase 저장 ──────────────────────────────────────
async function saveToFirebase() {
  try {
    await set(cardsRef, cards);
  } catch(e) {
    console.error('Firebase 저장 실패:', e);
    alert('저장에 실패했습니다. 네트워크를 확인해주세요.');
  }
}

// ── Firebase 실시간 수신 ───────────────────────────────

onValue(cardsRef, (snapshot) => {
  const data = snapshot.val();
  if (data && Array.isArray(data) && data.length > 0) {
    cards = data;
  } else if (!initialized) {
    // 첫 로드시 Firebase가 비어있으면 기본 데이터 저장
    cards = DEFAULT_CARDS;
    set(cardsRef, cards);
  }
  initialized = true;

  // 현재 상태에 따라 UI 업데이트
  if (document.getElementById('main-page').style.display !== 'none') {
    renderMain();
  } else if (current !== null && cards[current]) {
    renderMain();
    showDetail(current);
  } else {
    renderMain();
    goMain();
  }
}, (error) => {
  console.error('Firebase 연결 오류:', error);
});

// ── 렌더링 ────────────────────────────────────────────
function renderMain() {
  const c = document.getElementById('cards-container');
  c.innerHTML = '';
  cards.forEach((card, i) => {
    const d = document.createElement('div');
    d.className = 'trip-card';
    d.tabIndex = 0;
    d.onclick = () => showDetail(i);
    d.onkeydown = e => { if(e.key==='Enter') showDetail(i); };
    const color = COLORS[i % 4];
    d.innerHTML = `
      <div class="card-accent-bar" style="background:${color}"></div>
      <div class="card-icon-box" style="background:${color}; color:${card.iconBg}">${i+1}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-meta">
        <div class="meta-row"><i class="ti ti-clock"></i>${card.time||'미입력'}</div>
        <div class="meta-row"><i class="ti ti-currency-yen"></i>${card.price||'미입력'}</div>
      </div>
      <i class="ti ti-chevron-right card-arrow"></i>`;
    c.appendChild(d);
  });

  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.tabIndex = 0;
  addCard.onclick = () => openEdit(cards.length);
  addCard.onkeydown = e => { if(e.key==='Enter') openEdit(cards.length); };
  addCard.innerHTML = `<i class="ti ti-plus" style="font-size:24px;color:#9b9b98"></i><span>후보지 추가</span>`;
  c.appendChild(addCard);
}

function showDetail(i) {
  current = i;
  const card = cards[i];
  if (!card) { goMain(); return; }
  const facs = FACILITIES.filter(f => (card.facilities||[]).includes(f.id));
  const score = Math.min(5, Math.max(1, parseInt(card.score) || 3));
  const mapUrl = card.mapUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(card.name)}`;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero">
      <span class="hero-icon" style="background:${COLORS[i%4]}; color:${card.iconBg}">${i+1}</span>
      <div class="hero-details">
        <div class="hero-name">${card.name}</div>
        ${card.subtitle ? `<div class="hero-subtitle">${card.subtitle}</div>` : ''}
      </div>
      <div class="detail-links">
        ${card.website ? `<a class="power-link" href="${card.website}" target="_blank" rel="noopener"><i class="ti ti-world"></i></a>` : ''}
        <a class="map-link" href="${mapUrl}" target="_blank" rel="noopener" title="구글맵">
          <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='currentColor'%3E%3Cpath d='M12 2C8.686 2 6 4.686 6 8c0 4.425 6 12 6 12s6-7.575 6-12c0-3.314-2.686-6-6-6zm0 8a2 2 0 110-4 2 2 0 010 4z'/%3E%3C/svg%3E" alt="Google Maps">
        </a>
      </div>
    </div>
    ${facs.length ? `<div class="section">
      <div class="sec-title"><i class="ti ti-building-community"></i>편의시설</div>
      <div class="facility-grid">${facs.map(f=>`<div class="fac-item"><i class="ti ${f.icon}"></i>${f.label}</div>`).join('')}</div>
    </div>` : ''}
    ${card.notes ? `<div class="section">
  <div class="sec-title"><i class="ti ti-notes"></i>메모</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;">
    ${card.notes.split('/').map(t => t.trim()).filter(Boolean).map(t =>
      `<span style="padding:4px 10px;border-radius:8px;font-size:13px;background:var(--surface2);color:var(--text-sec);border:1px solid var(--border-strong);">${t}</span>`
    ).join('')}
  </div>
</div>` : ''}
    ${card.images && card.images.length ? `<div class="section">
      <div class="sec-title"><i class="ti ti-photo"></i>사진</div>
      <div class="photo-grid">${card.images.map((src, idx) => `<img class="photo-thumb" src="${src}" alt="사진 ${idx+1}" data-idx="${idx}">`).join('')}</div>
    </div>` : ''}
    <div class="section">
      <div class="sec-title"><i class="ti ti-bulb"></i>요약</div>
      <div class="score-row"><span class="score-label"><i class="ti ti-award"></i>추천도</span><span class="score-meta"><span class="detail-stars">${[1,2,3,4,5].map(n=>`<span class="${n<=score?'':'inactive'}">★</span>`).join('')}</span></span></div>
      <div class="score-row"><span class="score-label"><i class="ti ti-clock"></i>소요시간</span><span class="score-val">${card.time||'미입력'}</span></div>
      <div class="score-row"><span class="score-label"><i class="ti ti-currency-yen"></i>가격</span><span class="score-val">${card.price||'미입력'}</span></div>
    </div>`;

  // 사진 클릭 이벤트
  document.querySelectorAll('.photo-thumb').forEach(img => {
    img.onclick = () => openPhotoViewer(parseInt(img.dataset.idx));
  });

  document.getElementById('main-page').style.display = 'none';
  document.getElementById('detail-page').style.display = 'block';
  history.pushState({ page: 'detail' }, '');
}

function goMain() {
  document.getElementById('detail-page').style.display = 'none';
  document.getElementById('main-page').style.display = 'block';
  current = null;
}

// ── 편집 모달 ─────────────────────────────────────────
function openEdit(i) {
  editIdx = (i !== undefined) ? i : current;
  const isNew = editIdx === cards.length;
  const card = isNew ? {name:'',time:'',price:'',facilities:[],notes:'',score:3,images:[]} : cards[editIdx];
  document.getElementById('modal-title').textContent = card.name ? '후보지 편집' : `${editIdx+1}번째 후보지 추가`;
  document.getElementById('f-name').value = card.name||'';
  document.getElementById('f-subtitle').value = card.subtitle||'';
  document.getElementById('f-time').value = card.time||'';
  document.getElementById('f-price').value = card.price||'';
  document.getElementById('f-website').value = card.website||'';
  document.getElementById('f-mapurl').value = card.mapUrl||'';
  document.getElementById('f-notes').value = card.notes||'';
  document.getElementById('f-score').value = card.score||3;
  renderRatingPicker(card.score||3);
  selFac = [...(card.facilities||[])];
  selImages = [...(card.images||[])];
  document.getElementById('fac-chips').innerHTML = FACILITIES.map(f =>
    `<div class="chip${selFac.includes(f.id)?' on':''}" data-id="${f.id}"><i class="ti ${f.icon}" style="font-size:13px"></i>${f.label}</div>`
  ).join('');
  document.querySelectorAll('#fac-chips .chip').forEach(chip => {
    chip.onclick = () => {
      const id = chip.dataset.id;
      if(selFac.includes(id)){ selFac=selFac.filter(f=>f!==id); chip.classList.remove('on'); }
      else { selFac.push(id); chip.classList.add('on'); }
    };
  });
  renderPhotoPreviews();
  document.getElementById('f-photos').value = '';
  document.getElementById('modal-bg').classList.add('open');
}

function renderPhotoPreviews() {
  document.getElementById('photo-preview-grid').innerHTML = selImages.map((src, idx) =>
    `<div class="photo-preview"><img src="${src}" alt="preview"><button class="preview-remove" data-idx="${idx}" type="button">×</button></div>`
  ).join('');
  document.querySelectorAll('.preview-remove').forEach(btn => {
    btn.onclick = () => {
      selImages.splice(parseInt(btn.dataset.idx), 1);
      renderPhotoPreviews();
    };
  });
}

function renderRatingPicker(value) {
  const container = document.getElementById('f-score-stars');
  container.innerHTML = '';
  const score = Math.min(5, Math.max(1, parseInt(value)||3));
  for(let i=1; i<=5; i++){
    const star = document.createElement('button');
    star.type = 'button';
    star.className = `rating-star${i<=score?' filled':''}`;
    star.innerHTML = '★';
    star.onclick = () => {
      document.getElementById('f-score').value = i;
      renderRatingPicker(i);
    };
    container.appendChild(star);
  }
}

function _dismissModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

async function saveCard() {
  const name = document.getElementById('f-name').value.trim();
  const isNew = editIdx === cards.length;
  if (isNew && !name) { _dismissModal(); return; }
  const style = CARD_STYLES[editIdx % CARD_STYLES.length];
  cards[editIdx] = {
    id: editIdx,
    name,
    icon: style.icon,
    iconBg: style.iconBg,
    iconColor: style.iconColor,
    subtitle: document.getElementById('f-subtitle').value.trim(),
    time: document.getElementById('f-time').value.trim(),
    price: document.getElementById('f-price').value.trim(),
    website: document.getElementById('f-website').value.trim(),
    mapUrl: document.getElementById('f-mapurl').value.trim(),
    facilities: [...selFac],
    notes: document.getElementById('f-notes').value.trim(),
    score: parseInt(document.getElementById('f-score').value)||3,
    images: [...selImages],
  };
  _dismissModal();
  await saveToFirebase();
}

async function deleteCard() {
  if(current === null || !cards[current]) return;
  if(!confirm('이 후보지를 삭제하시겠습니까?')) return;
  cards.splice(current, 1);
  history.back();
  await saveToFirebase();
}

function closeModal() { saveCard(); }

// ── 사진 뷰어 ─────────────────────────────────────────
function openPhotoViewer(index) {
  const card = cards[current];
  if(!card || !card.images || !card.images.length) return;
  currentPhotoIndex = index;
  loadAdjacentImages();
  viewerTrack.style.transition = 'none';
  viewerTrack.style.transform = 'translateX(-33.333%)';
  document.getElementById('photo-viewer-bg').classList.add('open');
}

function closePhotoViewer() {
  document.getElementById('photo-viewer-bg').classList.remove('open');
}

function movePhoto(direction) {
  const card = cards[current];
  if(!card || !card.images || !card.images.length) return;
  const total = card.images.length;
  const targetPct = direction === 1 ? -66.666 : 0;
  viewerTrack.style.transition = 'transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
  viewerTrack.style.transform = `translateX(${targetPct}%)`;
  viewerTrack.addEventListener('transitionend', function handler() {
    viewerTrack.removeEventListener('transitionend', handler);
    currentPhotoIndex = (currentPhotoIndex + direction + total) % total;
    viewerTrack.style.transition = 'none';
    viewerTrack.style.transform = 'translateX(-33.333%)';
    loadAdjacentImages();
  });
}

// ── 이벤트 바인딩 ─────────────────────────────────────
document.getElementById('back-btn').onclick = () => history.back();
window.addEventListener('popstate', () => {
  if (document.getElementById('detail-page').style.display !== 'none') goMain();
});
document.getElementById('edit-btn').onclick = () => openEdit();
document.getElementById('delete-btn').onclick = deleteCard;
document.getElementById('modal-cancel-btn').onclick = closeModal;
document.getElementById('modal-save-btn').onclick = saveCard;
document.getElementById('modal-bg').onclick = e => { if(e.target === document.getElementById('modal-bg')) closeModal(); };
document.getElementById('photo-viewer-bg').onclick = e => { if(e.target === document.getElementById('photo-viewer-bg')) closePhotoViewer(); };

// ── 상세페이지 왼쪽 스와이프 뒤로가기 ──────────────────────
enableDetailSwipeBack();

function enableDetailSwipeBack() {
  const detailPage = document.getElementById('detail-page');
  let startX = 0, startY = 0;
  let tracking = false;
  let isHorizontal = null;

  detailPage.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    tracking = true;
    isHorizontal = null;
  }, { passive: true });

  detailPage.addEventListener('touchmove', e => {
    if (!tracking || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (isHorizontal === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
      isHorizontal = Math.abs(dx) > Math.abs(dy);
    }
    if (isHorizontal) e.preventDefault();
  }, { passive: false });

  detailPage.addEventListener('touchend', e => {
    if (!tracking) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (isHorizontal && dx < -80 && Math.abs(dy) < 120) history.back();
    tracking = false;
    isHorizontal = null;
  }, { passive: true });

  detailPage.addEventListener('touchcancel', () => {
    tracking = false;
    isHorizontal = null;
  }, { passive: true });
}

document.getElementById('f-photos').onchange = e => {
  const files = Array.from(e.target.files);
  const available = 5 - selImages.length;
  files.slice(0, available).forEach(file => {
    const reader = new FileReader();
    reader.onload = () => { selImages.push(reader.result); renderPhotoPreviews(); };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
};
</script>
